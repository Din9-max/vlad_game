<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Томская Писаница</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1410;
      font-family: 'Georgia', serif;
      overscroll-behavior: none; /* Запрет pull-to-refresh */
      touch-action: none; /* Жесткий запрет браузерных жестов */
      -webkit-user-select: none;
      user-select: none;
      position: fixed;
    }

    #game-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #87CEEB;
      z-index: 1;
    }

    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.92);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      z-index: 10;
      padding: clamp(10px, 2vh, 20px);
      gap: clamp(8px, 2vh, 16px);
      overflow-y: auto;
    }

    h1 {
      color: #ff8c00;
      font-size: clamp(32px, 8vw, 56px); /* Увеличено */
      text-align: center;
      text-shadow: 0 0 20px rgba(255, 140, 0, 0.5);
    }

    .subtitle {
      color: #ffaa33;
      font-size: clamp(16px, 5vw, 28px); /* Увеличено */
      font-style: italic;
      text-align: center;
    }

    .instructions {
      background: rgba(30, 15, 5, 0.9);
      padding: clamp(12px, 2.5vh, 24px) clamp(16px, 4vw, 32px);
      border-radius: 16px;
      border: 2px solid #8b6914;
      width: min(96%, 550px);
      max-height: 50vh;
      overflow-y: auto;
    }

    .instructions p {
      margin: 6px 0;
      font-size: clamp(14px, 4vw, 22px); /* Увеличено */
      text-align: left;
      color: #e8d5b0;
      line-height: 1.4;
    }

    .key-hint {
      display: inline-block;
      background: #ffd700;
      color: #000;
      padding: clamp(2px, 0.5vh, 4px) clamp(6px, 2vw, 12px);
      border-radius: 6px;
      font-weight: bold;
      font-size: clamp(12px, 3vw, 18px);
    }

    button {
      background: #5a3d2b;
      color: #ffd700;
      border: 3px solid #8b6914;
      padding: clamp(14px, 3vh, 22px) clamp(24px, 8vw, 48px); /* Увеличено */
      font-size: clamp(18px, 6vw, 28px); /* Увеличено */
      cursor: pointer;
      border-radius: 16px;
      font-family: 'Georgia', serif;
      font-weight: bold;
      box-shadow: 0 4px 0 #3d2b1a;
      min-height: 56px;
      min-width: 200px;
      transition: all 0.1s;
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #3d2b1a;
      background: #8b6914;
    }

    #ui-bar {
      position: fixed;
      top: clamp(8px, 2vh, 16px);
      left: clamp(8px, 2vw, 16px);
      right: clamp(8px, 2vw, 16px);
      z-index: 5;
      pointer-events: none;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: clamp(6px, 1.5vw, 12px);
    }

    .ui-item {
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #ffd700;
      padding: clamp(6px, 1.2vh, 12px) clamp(10px, 2.5vw, 18px); /* Значительно увеличено для пальцев */
      border-radius: 16px;
      font-size: clamp(14px, 4.5vw, 22px); /* Увеличено */
      font-weight: bold;
      border: 2px solid #8b6914;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .ui-item .icon {
      display: inline-block;
      font-size: 1.1em;
      flex-shrink: 0;
    }

    #lantern-indicator {
      position: fixed;
      top: clamp(60px, 10vh, 80px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      pointer-events: none;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #ffff00;
      padding: clamp(6px, 1.2vh, 12px) clamp(12px, 3vw, 24px);
      border-radius: 20px;
      font-size: clamp(12px, 3.5vw, 18px);
      font-weight: bold;
      border: 2px solid #ffd700;
      display: none;
      white-space: nowrap;
    }

    .player-loot {
      position: fixed;
      pointer-events: none;
      z-index: 6;
      font-weight: bold;
      font-family: 'Georgia', serif;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
      animation: floatUp 1.5s ease-out forwards;
      white-space: nowrap;
      font-size: clamp(16px, 4vw, 24px);
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-80px); }
    }

    .glyph-label {
      position: fixed;
      pointer-events: none;
      z-index: 6;
      font-weight: bold;
      font-family: 'Georgia', serif;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
      animation: floatUpSlow 2s ease-out forwards;
      white-space: nowrap;
      font-size: clamp(18px, 4.5vw, 28px);
    }

    @keyframes floatUpSlow {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      50% { opacity: 1; transform: translateY(-40px) scale(1.2); }
      100% { opacity: 0; transform: translateY(-90px) scale(0.8); }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas"></canvas>
  </div>

  <div id="ui-bar">
    <span class="ui-item"><span class="icon">🗿</span> <span id="fd">0</span>/12</span>
    <span class="ui-item"><span class="icon">❤️</span> <span id="hd">5</span></span>
    <span class="ui-item"><span class="icon">⛏️</span> <span id="td">3</span></span>
    <span class="ui-item"><span class="icon">🔮</span> <span id="cd">0</span></span>
    <span class="ui-item"><span class="icon">⭐</span> <span id="sd">0</span></span>
    <span class="ui-item"><span class="icon">👻</span> <span id="gd">0</span></span>
    <span class="ui-item"><span class="icon">🔦</span> <span id="ed">100</span>%</span>
  </div>

  <div id="lantern-indicator">🔦 ФОНАРЬ ВКЛЮЧЕН</div>

  <div id="overlay">
    <h1>🗿 ТОМСКАЯ ПИСАНИЦА</h1>
    <p class="subtitle">Наследие Древних Шаманов</p>
    <div class="instructions">
      <p>🎯 Найдите все 12 рисунков</p>
      <p>👆 <span class="key-hint">СВАЙП</span> — движение</p>
      <p>👆 <span class="key-hint">ТАП</span> — разбить / собрать</p>
      <p>🔦 <span class="key-hint">ДОЛГИЙ ТАП</span> — фонарь</p>
      <p>⛏️ Кирки (жёлтые) | 🔮 Кристаллы (фиолетовые)</p>
      <p>👻 Духи при разбитии (55%)</p>
    </div>
    <button id="startBtn">🏛️ НАЧАТЬ</button>
    <p style="color:#ffd700;font-size:clamp(12px,3vw,18px);">или <span class="key-hint">ПРОБЕЛ</span></p>
  </div>

  <script>
    (function() {
      var canvas = document.getElementById('gameCanvas');
      var ctx = canvas.getContext('2d');
      var overlay = document.getElementById('overlay');
      var lanternInd = document.getElementById('lantern-indicator');
      var startBtn = document.getElementById('startBtn');
      var container = document.getElementById('game-container');

      var gameRunning = false;
      var gameOver = false;
      var mouseX = window.innerWidth / 2;
      var mouseY = window.innerHeight / 2;
      var score = 0;
      var health = 5;
      var tools = 3;
      var crystals = 0;
      var found = 0;
      var lantern = false;
      var energy = 100;
      var hurt = 0;
      var frame = 0;
      var entScale = 1; // Динамический масштаб объектов
      
      var player = { x: 500, y: 550, speed: 4.5, dir: 1 };

      var drawingsData = [
        { name: 'Лось', sym: '🦌', rare: false },
        { name: 'Птица', sym: '🦅', rare: false },
        { name: 'Солнце', sym: '☀️', rare: false },
        { name: 'Охотник', sym: '🏹', rare: false },
        { name: 'Шаман', sym: '🧙', rare: true },
        { name: 'Змей', sym: '🐍', rare: false },
        { name: 'Рыба', sym: '🐟', rare: false },
        { name: 'Медведь', sym: '🐻', rare: true },
        { name: 'Колесница', sym: '⚡', rare: false },
        { name: 'Танец', sym: '💃', rare: false },
        { name: 'Древо', sym: '🌳', rare: true },
        { name: 'Врата', sym: '🚪', rare: true }
      ];

      var drawings = [], ghosts = [], toolItems = [], crystalItems = [], particles = [];

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        // Масштабируем сущности так, чтобы на телефоне они были достаточно крупными (минимум x1.5)
        entScale = Math.max(1.5, Math.min(canvas.width, canvas.height) / 500);
      }

      window.addEventListener('resize', resize);
      window.addEventListener('orientationchange', function() { setTimeout(resize, 200); });
      if (window.visualViewport) window.visualViewport.addEventListener('resize', resize);
      resize();

      function getInputPos(e) {
        var cx, cy;
        if (e.touches && e.touches.length > 0) {
          cx = e.touches[0].clientX; cy = e.touches[0].clientY;
        } else if (e.changedTouches && e.changedTouches.length > 0) {
          cx = e.changedTouches[0].clientX; cy = e.changedTouches[0].clientY;
        } else {
          cx = e.clientX; cy = e.clientY;
        }
        return { x: cx, y: cy }; // Возвращаем прямые координаты экрана
      }

      function placeDrawings() {
        drawings = [];
        var used = [];
        var minW = canvas.width * 0.05, maxW = canvas.width * 0.9;
        var minH = canvas.height * 0.25, maxH = canvas.height * 0.6; // Спавн на холмах

        for (var i = 0; i < drawingsData.length; i++) {
          var ok = false, tries = 0, px, py;
          while (!ok && tries < 100) {
            px = minW + Math.random() * maxW;
            py = minH + Math.random() * maxH;
            ok = true;
            for (var j = 0; j < used.length; j++) {
              if (Math.sqrt((px - used[j].x) ** 2 + (py - used[j].y) ** 2) < 80 * entScale) {
                ok = false; break;
              }
            }
            tries++;
          }
          used.push({ x: px, y: py });
          drawings.push({
            x: px, y: py, name: drawingsData[i].name, sym: drawingsData[i].sym,
            rare: drawingsData[i].rare, found: false, hidden: drawingsData[i].rare
          });
        }
      }

      function spawnTools() {
        toolItems = [];
        for (var i = 0; i < 12; i++) {
          toolItems.push({ x: canvas.width * 0.05 + Math.random() * canvas.width * 0.9, y: canvas.height * 0.3 + Math.random() * canvas.height * 0.6 });
        }
      }

      function spawnCrystals() {
        crystalItems = [];
        for (var i = 0; i < 8; i++) {
          crystalItems.push({ x: canvas.width * 0.05 + Math.random() * canvas.width * 0.9, y: canvas.height * 0.3 + Math.random() * canvas.height * 0.6 });
        }
      }

      function spawnGhost(x, y) {
        var n = 1 + Math.floor(Math.random() * 2);
        for (var i = 0; i < n; i++) {
          ghosts.push({
            x: x + (Math.random() - 0.5) * 150 * entScale,
            y: y + (Math.random() - 0.5) * 150 * entScale,
            speed: (0.8 + Math.random() * 1.5) * entScale,
            float: Math.random() * 6.28,
            life: 400 + Math.floor(Math.random() * 200)
          });
        }
      }

      function addParticles(x, y, color, n) {
        for (var i = 0; i < n; i++) {
          particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 8 * entScale,
            vy: ((Math.random() - 0.5) * 8 - 2) * entScale,
            life: 1, decay: 0.03, color: color,
            size: (2 + Math.random() * 4) * entScale
          });
        }
      }

      function showGlyphLabel(x, y, text, color) {
        var div = document.createElement('div');
        div.className = 'glyph-label';
        div.textContent = text;
        div.style.left = x + 'px';
        div.style.top = y + 'px';
        div.style.color = color || '#ffd700';
        container.appendChild(div);
        setTimeout(function() { div.remove(); }, 2000);
      }

      function showPlayerLoot(x, y, text, color) {
        var div = document.createElement('div');
        div.className = 'player-loot';
        div.textContent = text;
        div.style.left = x + 'px';
        div.style.top = (y - 50) + 'px';
        div.style.color = color || '#ffffff';
        container.appendChild(div);
        setTimeout(function() { div.remove(); }, 1500);
      }

      function toggleLantern() {
        if (!gameRunning || gameOver) return;
        if (lantern) {
          lantern = false;
          lanternInd.style.display = 'none';
          return;
        }
        if (energy <= 0) {
          if (crystals > 0) {
            crystals--;
            energy = Math.min(100, energy + 40);
            showPlayerLoot(player.x, player.y, '🔮 +40% энергии', '#cc88ff');
            updateUI();
          } else {
            showPlayerLoot(player.x, player.y, 'Нет энергии!', '#ff8888');
            return;
          }
        }
        lantern = true;
        lanternInd.style.display = 'block';
        lanternInd.textContent = '🔦 ФОНАРЬ | ' + Math.floor(energy) + '% | 🔮 ' + crystals;
      }

      canvas.addEventListener('mousemove', function(e) { var p = getInputPos(e); mouseX = p.x; mouseY = p.y; });
      canvas.addEventListener('touchmove', function(e) { e.preventDefault(); var p = getInputPos(e); mouseX = p.x; mouseY = p.y; }, { passive: false });

      var touchStartTime = 0;
      canvas.addEventListener('touchstart', function(e) {
        e.preventDefault();
        var p = getInputPos(e); mouseX = p.x; mouseY = p.y;
        touchStartTime = Date.now();
      }, { passive: false });

      canvas.addEventListener('touchend', function(e) {
        e.preventDefault();
        var dt = Date.now() - touchStartTime;
        if (dt < 300) handleClick();
        else if (dt >= 500) toggleLantern();
      }, { passive: false });

      canvas.addEventListener('click', function(e) { handleClick(); });
      canvas.addEventListener('contextmenu', function(e) { e.preventDefault(); toggleLantern(); });

      document.addEventListener('keydown', function(e) {
        if (e.code === 'Space') {
          e.preventDefault();
          if (!gameRunning && !gameOver) startGame();
          else if (gameOver) restartGame();
        }
        if (e.code === 'KeyF') { e.preventDefault(); toggleLantern(); }
        if (e.code === 'KeyC') {
          e.preventDefault();
          if (gameRunning && !gameOver && crystals > 0 && energy < 100) {
            crystals--; energy = Math.min(100, energy + 40);
            showPlayerLoot(player.x, player.y, '🔮 +40% энергии', '#cc88ff');
            updateUI();
            if (!lantern && energy > 0) {
              lantern = true; lanternInd.style.display = 'block';
              lanternInd.textContent = '🔦 ФОНАРЬ | ' + Math.floor(energy) + '% | 🔮 ' + crystals;
            }
          }
        }
      });

      function handleClick() {
        if (!gameRunning || gameOver) return;

        for (var i = toolItems.length - 1; i >= 0; i--) {
          var t = toolItems[i];
          if (Math.sqrt((player.x - t.x) ** 2 + (player.y - t.y) ** 2) < 40 * entScale) {
            tools++;
            addParticles(t.x, t.y, '#ffd700', 10);
            showPlayerLoot(player.x, player.y, '+1 кирка', '#ffd700');
            toolItems.splice(i, 1);
            updateUI();
            return;
          }
        }

        for (var i = crystalItems.length - 1; i >= 0; i--) {
          var c = crystalItems[i];
          if (Math.sqrt((player.x - c.x) ** 2 + (player.y - c.y) ** 2) < 40 * entScale) {
            crystals++;
            addParticles(c.x, c.y, '#cc88ff', 12);
            showPlayerLoot(player.x, player.y, '+1 🔮', '#cc88ff');
            crystalItems.splice(i, 1);
            updateUI();
            return;
          }
        }

        for (var i = 0; i < drawings.length; i++) {
          var d = drawings[i];
          if (d.found) continue;
          var dist = Math.sqrt((player.x - d.x) ** 2 + (player.y - d.y) ** 2);
          var range = d.hidden ? (lantern ? 70 * entScale : 0) : 65 * entScale;
          if (dist < range && tools > 0) {
            d.found = true; found++; tools--;
            score += d.rare ? 300 : 100;
            var glyphText = (d.rare ? '⭐ ' : '') + '«' + d.name + '»';
            var glyphColor = d.rare ? '#ffd700' : '#ffaa00';
            showGlyphLabel(d.x, d.y, glyphText, glyphColor);
            var lootText = '';
            if (Math.random() < 0.3) { var cc = 1 + Math.floor(Math.random() * 8); crystals += cc; lootText += '🔮+' + cc + ' '; }
            if (Math.random() < 0.4) { var tt = 1 + Math.floor(Math.random() * 3); tools += tt; lootText += '⛏️+' + tt + ' '; }
            if (Math.random() < 0.55) { spawnGhost(d.x, d.y); lootText += '👻Духи! '; }
            if (lootText) showPlayerLoot(player.x, player.y, lootText.trim(), '#ffffff');
            addParticles(d.x, d.y, '#ffd700', d.rare ? 30 : 20);
            updateUI();
            if (found >= 12) {
              setTimeout(function() { gameOver = true; gameRunning = false; showEndScreen(true); }, 1500);
            }
            return;
          }
        }
      }

      function update() {
        if (!gameRunning || gameOver) return;
        frame++;
        var dx = mouseX - player.x;
        var dy = mouseY - player.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        
        // Масштабируем скорость чтобы движение ощущалось плавным на любых экранах
        var dynamicSpeed = player.speed * entScale * 0.7; 
        
        if (dist > 5 * entScale) {
          player.x += (dx / dist) * dynamicSpeed;
          player.y += (dy / dist) * dynamicSpeed;
          player.dir = dx > 0 ? 1 : -1;
        }
        
        player.x = Math.max(30 * entScale, Math.min(canvas.width - 30 * entScale, player.x));
        player.y = Math.max(canvas.height * 0.35, Math.min(canvas.height - 30 * entScale, player.y));
        if (hurt > 0) hurt--;

        if (lantern) {
          energy = Math.max(0, energy - 0.2);
          if (energy <= 0) {
            lantern = false; lanternInd.style.display = 'none';
            showPlayerLoot(player.x, player.y, 'Фонарь разряжен!', '#ff8888');
          }
          if (lantern) lanternInd.textContent = '🔦 ФОНАРЬ | ' + Math.floor(energy) + '% | 🔮 ' + crystals;
        } else {
          if (energy < 100) energy = Math.min(100, energy + 0.05);
        }

        for (var i = ghosts.length - 1; i >= 0; i--) {
          var g = ghosts[i];
          g.life--;
          var sx = player.x - g.x; var sy = player.y - g.y;
          var sd = Math.sqrt(sx * sx + sy * sy) || 1;
          g.x += (sx / sd) * g.speed; g.y += (sy / sd) * g.speed;
          g.float += 0.05;
          if (Math.sqrt((player.x - g.x) ** 2 + (player.y - g.y) ** 2) < 30 * entScale && hurt <= 0) {
            health--; hurt = 50;
            addParticles(player.x, player.y, '#ff0000', 15);
            showPlayerLoot(player.x, player.y, '-1 ❤️', '#ff4444');
            if (health <= 0) { gameOver = true; gameRunning = false; showEndScreen(false); }
          }
          if (g.life <= 0) ghosts.splice(i, 1);
        }

        if (frame % 300 === 0 && toolItems.length < 8) {
          toolItems.push({ x: canvas.width * 0.05 + Math.random() * canvas.width * 0.9, y: canvas.height * 0.35 + Math.random() * canvas.height * 0.55 });
        }
        if (frame % 400 === 0 && crystalItems.length < 6) {
          crystalItems.push({ x: canvas.width * 0.05 + Math.random() * canvas.width * 0.9, y: canvas.height * 0.35 + Math.random() * canvas.height * 0.55 });
        }

        particles = particles.filter(function(p) {
          p.x += p.vx; p.y += p.vy; p.life -= p.decay;
          return p.life > 0;
        });
        updateUI();
      }

      function updateUI() {
        document.getElementById('fd').textContent = found;
        document.getElementById('hd').textContent = health;
        document.getElementById('td').textContent = tools;
        document.getElementById('cd').textContent = crystals;
        document.getElementById('sd').textContent = score;
        document.getElementById('gd').textContent = ghosts.length;
        document.getElementById('ed').textContent = Math.floor(energy);
      }

      function draw() {
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Динамический фон на весь экран
        var sg = ctx.createLinearGradient(0, 0, 0, canvas.height * 0.6);
        sg.addColorStop(0, '#87CEEB');
        sg.addColorStop(1, '#c8b896');
        ctx.fillStyle = sg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#ffd700';
        ctx.beginPath();
        ctx.arc(canvas.width * 0.85, canvas.height * 0.15, 40 * entScale, 0, 6.28);
        ctx.fill();

        // Дальние холмы
        var hillBase1 = canvas.height * 0.55;
        ctx.fillStyle = '#8b7d6b';
        ctx.beginPath();
        ctx.moveTo(0, hillBase1);
        for (var x = 0; x <= canvas.width + 150; x += 55 * entScale) {
          ctx.lineTo(x, hillBase1 - 80 * entScale + Math.sin(x * 0.015 / entScale) * 60 * entScale);
        }
        ctx.lineTo(canvas.width, hillBase1);
        ctx.fill();

        // Ближние холмы
        var hillBase2 = canvas.height * 0.6;
        ctx.fillStyle = '#6b5d4b';
        ctx.beginPath();
        ctx.moveTo(0, hillBase2);
        for (var x = 0; x <= canvas.width + 150; x += 42 * entScale) {
          ctx.lineTo(x, hillBase2 - 50 * entScale + Math.sin(x * 0.01 / entScale) * 50 * entScale);
        }
        ctx.lineTo(canvas.width, hillBase2);
        ctx.fill();

        // Земля
        ctx.fillStyle = '#8b7b5a';
        ctx.fillRect(0, hillBase2, canvas.width, canvas.height - hillBase2);

        // Отрисовка сущностей (с динамическим масштабом entScale)
        for (var i = 0; i < toolItems.length; i++) {
          var t = toolItems[i];
          ctx.save(); ctx.translate(t.x, t.y); ctx.scale(entScale, entScale);
          ctx.fillStyle = 'rgba(255,215,0,0.3)'; ctx.beginPath(); ctx.arc(0, 0, 16, 0, 6.28); ctx.fill();
          ctx.fillStyle = '#ffd700'; ctx.beginPath(); ctx.arc(0, 0, 11, 0, 6.28); ctx.fill();
          ctx.fillStyle = '#8b6914'; ctx.font = '16px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText('⛏️', 0, 0);
          ctx.restore();
        }

        for (var i = 0; i < crystalItems.length; i++) {
          var c = crystalItems[i];
          ctx.save(); ctx.translate(c.x, c.y); ctx.scale(entScale, entScale);
          var glow = Math.sin(frame * 0.06) * 0.4 + 0.6;
          ctx.fillStyle = 'rgba(180,130,255,' + glow + ')'; ctx.beginPath(); ctx.arc(0, 0, 14, 0, 6.28); ctx.fill();
          ctx.fillStyle = '#fff'; ctx.font = '16px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText('🔮', 0, 0);
          ctx.restore();
        }

        for (var i = 0; i < drawings.length; i++) {
          var d = drawings[i];
          if (d.found) continue;
          ctx.save(); ctx.translate(d.x, d.y); ctx.scale(entScale, entScale);
          if (!d.hidden || lantern) {
            var alpha = Math.sin(frame * 0.04) * 0.3 + 0.4;
            ctx.fillStyle = 'rgba(255,140,0,' + alpha + ')'; ctx.beginPath(); ctx.arc(0, 0, 26, 0, 6.28); ctx.fill();
          }
          ctx.fillStyle = '#9b8365'; ctx.beginPath(); ctx.ellipse(0, 0, 26, 22, 0, 0, 6.28); ctx.fill();
          ctx.fillStyle = (d.hidden && !lantern) ? '#5a4a3a' : '#6b3a2a';
          ctx.font = '24px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText((d.hidden && !lantern) ? '?' : d.sym, 0, 0);
          ctx.restore();
        }

        for (var i = 0; i < ghosts.length; i++) {
          var g = ghosts[i];
          ctx.save(); ctx.translate(g.x, g.y); ctx.scale(entScale, entScale);
          var fy = Math.sin(g.float) * 8;
          var alpha = Math.min(1, g.life / 100);
          ctx.globalAlpha = alpha; ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(0, -4 + fy, 12, Math.PI, 0);
          for (var w = 0; w < 4; w++) { var wx = -12 + w * 6; var wy = 8 + fy + (w % 2 === 0 ? 0 : 4); ctx.lineTo(wx + 3, wy); }
          ctx.fill(); ctx.fillStyle = '#000'; ctx.fillRect(-5, -7 + fy, 3, 3); ctx.fillRect(2, -7 + fy, 3, 3);
          ctx.restore();
        }
        ctx.globalAlpha = 1;

        if (hurt <= 0 || Math.floor(frame / 4) % 2 === 0) {
          ctx.save(); ctx.translate(player.x, player.y); ctx.scale(entScale, entScale);
          if (player.dir < 0) ctx.scale(-1, 1);
          ctx.fillStyle = '#4a3020'; ctx.fillRect(-5, 8, 4, 11); ctx.fillRect(1, 8, 4, 11);
          ctx.fillStyle = '#8b6914'; ctx.fillRect(-8, -5, 16, 17);
          ctx.fillStyle = '#d4a76a'; ctx.beginPath(); ctx.arc(0, -11, 8, 0, 6.28); ctx.fill();
          ctx.fillStyle = '#5a3d2b'; ctx.fillRect(-9, -19, 18, 5); ctx.fillRect(-6, -24, 12, 7);
          ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(-3, -12, 1.5, 0, 6.28); ctx.arc(3, -12, 1.5, 0, 6.28); ctx.fill();
          ctx.restore();
        }

        if (lantern) {
          var rad = 200 * entScale;
          var grd = ctx.createRadialGradient(player.x, player.y, rad * 0.2, player.x, player.y, rad);
          grd.addColorStop(0, 'rgba(255,255,200,0.3)'); grd.addColorStop(1, 'rgba(255,255,200,0)');
          ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(player.x, player.y, rad, 0, 6.28); ctx.fill();
        }

        for (var i = 0; i < particles.length; i++) {
          var p = particles[i];
          ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
          ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
        }
        ctx.globalAlpha = 1;
      }

      function showEndScreen(win) {
        lanternInd.style.display = 'none'; overlay.style.display = 'flex';
        if (win) {
          overlay.innerHTML = '<h1 style="color:#ffd700;">🎉 ПОБЕДА!</h1><p style="font-size:clamp(18px,5vw,28px);">Все рисунки найдены!</p><p style="font-size:clamp(16px,4vw,24px);">⭐ ' + score + ' | 🔮 ' + crystals + '</p><button id="restartBtn">🔄 ИГРАТЬ СНОВА</button>';
        } else {
          overlay.innerHTML = '<h1 style="color:#ff4444;">👻 ДУХИ ОДОЛЕЛИ</h1><p style="font-size:clamp(16px,4vw,24px);">Найдено: ' + found + '/12 | ⭐ ' + score + '</p><button id="restartBtn">🔄 ПОПРОБОВАТЬ СНОВА</button>';
        }
        setTimeout(function() {
          var rb = document.getElementById('restartBtn');
          if (rb) rb.onclick = function() { restartGame(); };
        }, 100);
      }

      function gameLoop() {
        if (gameRunning && !gameOver) { update(); draw(); }
        requestAnimationFrame(gameLoop);
      }

      function startGame() {
        resize();
        gameRunning = true; gameOver = false;
        score = 0; health = 5; tools = 3; crystals = 0; found = 0;
        lantern = false; energy = 100; hurt = 0; frame = 0;
        player.x = canvas.width / 2;
        player.y = canvas.height * 0.75;
        ghosts = []; particles = [];
        placeDrawings(); spawnTools(); spawnCrystals();
        overlay.style.display = 'none'; lanternInd.style.display = 'none';
        updateUI(); draw();
      }

      function restartGame() { startGame(); }
      startBtn.onclick = function() { startGame(); };
      gameLoop(); updateUI();
    })();
  </script>
</body>
</html>
